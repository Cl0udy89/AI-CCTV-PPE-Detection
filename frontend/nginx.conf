server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy → FastAPI backend ───────────────────────────────────────
    # All known backend prefixes are forwarded to the backend service.
    location ~ ^/(stream|detection|zones|incidents|stats|alerts|health|auth|users|workers|shifts|notifications|reports|actions|admin|setup|cameras) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Keep-alive + WebSocket/SSE upgrade passthrough
        proxy_set_header   Connection        '';
        proxy_set_header   Upgrade           $http_upgrade;

        # SSE & MJPEG stream: disable buffering so frames arrive immediately
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Generous timeouts for long-lived streams (MJPEG / SSE)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── React SPA — serve index.html for all unknown paths ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    application/x-javascript text/javascript image/svg+xml;
    gzip_min_length 1024;
}
